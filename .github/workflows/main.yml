name: PIRL Simulation CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        lfs: true # Essential for pulling .pth model weights correctly

    - name: Checkout LFS objects
      run: git lfs checkout

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        # Specifically targeting the requirements in the project path
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Unit Tests
      run: |
        # Verify environment step logic and physics determinism
        pytest sim/test_sim.py

    - name: Execute Phase 1 Gate Check
      run: |
        # MANDATORY: RMSE < 0.05 rad assertion.
        # This script acts as the final strategic gatekeeper.
        python reproduce_results.py
