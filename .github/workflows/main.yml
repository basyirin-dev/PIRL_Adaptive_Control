name: PIRL Simulation CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        lfs: true # Essential for pulling .pth model weights correctly

    - name: Checkout LFS objects
      run: git lfs checkout

    - name: Build PIRL Docker Image
      run: docker build -t pirl-sim-env:latest .

    - name: Run Unit Tests (Docker)
      # Overriding entrypoint to run tests inside the identical container environment
      # Note: Ensure pytest is listed in your requirements.txt
      run: docker run --entrypoint python pirl-sim-env:latest -m pytest sim/test_sim.py

    - name: Execute Phase 1 Gate Check
      # MANDATORY: RMSE < 0.05 rad assertion.
      # This containerized script acts as the final strategic gatekeeper.
      run: docker run pirl-sim-env:latest
